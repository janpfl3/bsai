linux-x86_64:build-image:
  extends: .docker_build
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/linux-x86_64
    DOCKER_FILE: ci/linux-x86_64/Dockerfile
    DOCKER_BUILD_ARGS: --build-arg QT_INSTALLER_JWT_TOKEN=${QT_INSTALLER_JWT_TOKEN}

.linux-x86_64:
  image: $CI_REGISTRY_IMAGE/linux-x86_64@sha256:7fcc83e44a4e4c0560c340c1140c1d130ceebe0f938a2804d625b52f7aa7c7c2
  extends:
    - .build
  tags:
    - cloud

linux-x86_64:build-appimage:
  extends:
    - .linux-x86_64
  before_script:
    - export PATH="/qt/6.8.3/gcc_64/bin:$PREFIX/bin/:$PATH"
    - export CMAKE_PREFIX_PATH="$PREFIX:$CMAKE_PREFIX_PATH"
  after_script:
    - mv build/blockstream .
    - tools/appimage.sh --plugin-qt $CI_PROJECT_DIR
    - mkdir linux-x86_64
    - mv Blockstream-x86_64.AppImage linux-x86_64/
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - linux-x86_64/Blockstream-x86_64.AppImage
