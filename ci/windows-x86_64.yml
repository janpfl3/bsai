windows-x86_64:build-gdk:
  extends: .docker_build
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/windows-x86_64
    DOCKER_FILE: ci/windows-x86_64/Dockerfile

windows-x86_64:share-gdk:
  image: $CI_REGISTRY_IMAGE/windows-x86_64@sha256:89d57f078bd96583fbea108b6759a36f946929c01c0588bd946682d04e414d55
  script:
    - cp -R /depends depends
  stage: depends
  tags:
    - cloud
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - depends
  when: manual

windows-x86_64:build-image:
  stage: depends
  image: docker:27
  when: manual
  retry:
    max: 2
    when:
      - runner_system_failure
      - unknown_failure
      - stuck_or_timeout_failure
  variables:
    DOCKER_BUILDKIT: 0
    DOCKER_DRIVER: null
    DOCKER_HOST: null
    GIT_CLEAN_FLAGS: -ffdx
  needs:
    - windows-x86_64:share-gdk
  tags:
    - windows
  script:
    - xcopy depends ci\x64-windows\depends /E /I /H /Y
    - dir ci\x64-windows\depends
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull ${CI_REGISTRY_IMAGE}/x64-windows:latest
    - docker build ci\x64-windows --build-arg QT_INSTALLER_JWT_TOKEN=${QT_INSTALLER_JWT_TOKEN} -t ${CI_REGISTRY_IMAGE}/x64-windows:${CI_COMMIT_SHA} -t ${CI_REGISTRY_IMAGE}/x64-windows:latest
    - docker push ${CI_REGISTRY_IMAGE}/x64-windows:${CI_COMMIT_SHA}
    - docker push ${CI_REGISTRY_IMAGE}/x64-windows:latest

windows-x86_64:build:
  stage: build
  tags:
    - windows
  variables:
    DOCKER_BUILDKIT: 0
    DOCKER_DRIVER: null
    DOCKER_HOST: null
    GIT_CLEAN_FLAGS: -ffdx
    IMAGE: $CI_REGISTRY_IMAGE/x64-windows@sha256:bb288ce8a5c53403f2297b008b28675701189b7778ac8ab20105ca7ac72e7f0a
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker image inspect $IMAGE || docker pull $IMAGE
    - docker run --rm -v ${CI_PROJECT_DIR}:C:\src -e CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME -e CI_COMMIT_SHORT_SHA=$CI_COMMIT_SHORT_SHA -e CI_COMMIT_BRANCH=$CI_COMMIT_BRANCH -e SENTRY_KEY=$SENTRY_KEY $IMAGE cmd /c C:\src\build.bat
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - bld/installer.iss
      - bld/RelWithDebInfo

windows-x86_64:sign:
  image:
    name: $CI_REGISTRY_IMAGE/codesigntool:latest
    pull_policy: always
  variables:
    GIT_STRATEGY: none
  tags:
    - k8s
  needs:
    - windows-x86_64:build
  script:
    - |
      bash CodeSignTool.sh sign \
      -credential_id="$SSL_COM_CREDENTIAL_ID" \
      -username="$SSL_COM_USERNAME" \
      -password="$SSL_COM_PASSWORD" \
      -totp_secret="$SSL_COM_TOTP_SECRET" \
      -input_file_path=bld/RelWithDebInfo/blockstream.exe \
      -override
    - |
      find bld -type f \( -iname "*.exe" -o -iname "*.dll" \) -exec echo bash CodeSignTool.sh sign \
        -credential_id="$SSL_COM_CREDENTIAL_ID" \
        -username="$SSL_COM_USERNAME" \
        -password="$SSL_COM_PASSWORD" \
        -totp_secret="$SSL_COM_TOTP_SECRET" \
        -input_file_path={} \
        -override \;
  stage: staple
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - bld/installer.iss
      - bld/RelWithDebInfo

windows-x86_64:installer:
  image:
    name: amake/innosetup
    entrypoint: [""]
  stage: installer
  tags:
    - ga
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    when: always
    paths:
      - Setup.exe
  needs:
    - windows-x86_64:sign
  script:
    - mv bld/installer.iss bld/RelWithDebInfo/
    - cp assets/installer/* bld/RelWithDebInfo/
    - iscc bld/RelWithDebInfo/installer.iss
    - mv bld/RelWithDebInfo/Setup.exe .

.windows:sign:
  image:
    name: $CI_REGISTRY_IMAGE/codesigntool:latest
    pull_policy: always
  variables:
    GIT_STRATEGY: none
  tags:
    - k8s
  retry:
    max: 2
    when:
      - runner_system_failure
      - unknown_failure
      - stuck_or_timeout_failure
  script:
    - mkdir -p signed
    - bash CodeSignTool.sh sign
      -credential_id="$SSL_COM_CREDENTIAL_ID"
      -username=$SSL_COM_USERNAME
      -password="$SSL_COM_PASSWORD"
      -totp_secret="$SSL_COM_TOTP_SECRET"
      -output_dir_path=signed
      -input_file_path="$INPUT_FILE"
    - mv "signed/$INPUT_FILE" "$OUTPUT_FILE"

windows-x86_64:sign-installer:
  extends: .windows:sign
  stage: installer
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    when: always
    paths:
      - BlockstreamSetup.exe
  needs:
    - windows-x86_64:installer
  variables:
    INPUT_FILE: Setup.exe
    OUTPUT_FILE: BlockstreamSetup.exe
